services:

  # ─── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  # Using the official pgvector image — vector extension is pre-installed.
  # Flyway's "CREATE EXTENSION IF NOT EXISTS vector" will work out of the box.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  # Uncomment in Phase 2 when Redisson + worker pipeline is wired up
  # redis:
  #   image: redis:7-alpine
  #   container_name: nexus-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  postgres_data:    # persists DB data across container restarts
  # redis_data:     # uncomment in Phase 2
