services:

  # ─── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ──────────────────────────────────────────────────
  core:
    build:
      context: ./nexus-platform-core
      dockerfile: Dockerfile
    container_name: nexus-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nexus}
      DB_USERNAME: ${POSTGRES_USER:-nexus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Node.js Worker (Search, AI, Embeddings) ─────────────────────────────
  worker:
    build:
      context: ./nexus-platform-worker
      dockerfile: Dockerfile
    container_name: nexus-worker
    restart: unless-stopped
    environment:
      PORT: 3005
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      QDRANT_ENDPOINT: ${QDRANT_ENDPOINT}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    ports:
      - "3005:3005"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend (React + Nginx) ────────────────────────────────────────────
  web:
    build:
      context: ./nexus-platform-web
      dockerfile: Dockerfile
    container_name: nexus-web
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
      worker:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
